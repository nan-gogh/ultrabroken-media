name: Media — Edit (Trim+Concat+Transcode)

on:
  workflow_dispatch:
    inputs:
      edit:
        description: 'JSON: {"clips":[{"key":"...","start":0,"end":-1},...], "output":"video/name.webm"}'
        required: true
        type: string

concurrency:
  group: edit
  cancel-in-progress: false

jobs:
  edit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Cache ffmpeg
        id: cache-ffmpeg
        uses: actions/cache@v5
        with:
          path: /usr/local/bin/ffmpeg
          key: ffmpeg-linux64-gpl-v1

      - name: Install ffmpeg
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          wget -q -O /tmp/ff.tar.xz \
            'https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz'
          tar -xJf /tmp/ff.tar.xz -C /tmp ffmpeg-master-latest-linux64-gpl/bin/ffmpeg
          sudo mv /tmp/ffmpeg-master-latest-linux64-gpl/bin/ffmpeg /usr/local/bin/ffmpeg
          rm -rf /tmp/ff.tar.xz /tmp/ffmpeg-master-latest-linux64-gpl

      - name: Cache npm packages
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-wrangler-4

      - name: Install wrangler
        run: npm install -g wrangler@4

      - name: Edit, transcode and upload
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          EDIT_JSON: ${{ inputs.edit }}
        run: |
          set -euo pipefail

          CLIP_COUNT=$(echo "$EDIT_JSON" | jq '.clips | length')
          OUTPUT_KEY=$(echo "$EDIT_JSON" | jq -r '.output')

          echo "=== Video Edit Job ==="
          echo "Clips: $CLIP_COUNT"
          echo "Output: $OUTPUT_KEY"
          echo ""

          > concat_list.txt

          for i in $(seq 0 $(( CLIP_COUNT - 1 ))); do
            KEY=$(echo "$EDIT_JSON" | jq -r ".clips[$i].key")
            START=$(echo "$EDIT_JSON" | jq -r ".clips[$i].start")
            END=$(echo "$EDIT_JSON" | jq -r ".clips[$i].end")

            EXT="${KEY##*.}"
            EXT_LOWER=$(echo "$EXT" | tr '[:upper:]' '[:lower:]')

            echo "--- Clip $((i+1)): $KEY ---"
            echo "  Trim: ${START}s → ${END}s"

            # Download from R2
            wrangler r2 object get "ultrabroken-media/$KEY" --file="clip_${i}.${EXT_LOWER}" --remote

            # Build trim arguments
            TRIM_ARGS=""
            HAS_TRIM=false

            if [ "$(echo "$START > 0" | bc -l)" -eq 1 ]; then
              TRIM_ARGS="-ss $START"
              HAS_TRIM=true
            fi

            if [ "$END" != "-1" ]; then
              TRIM_ARGS="$TRIM_ARGS -to $END"
              HAS_TRIM=true
            fi

            # Re-encode trim to intermediate (frame-accurate cuts, avoids frozen frames)
            ffmpeg -i "clip_${i}.${EXT_LOWER}" $TRIM_ARGS \
              -c:v libx264 -preset ultrafast -crf 0 \
              -c:a pcm_s16le \
              -y "trimmed_${i}.mkv"
            rm -f "clip_${i}.${EXT_LOWER}"

            echo "file 'trimmed_${i}.mkv'" >> concat_list.txt
            echo "  Done"
          done

          echo ""
          echo "=== Concatenating + Transcoding to AV1+Opus ==="

          ffmpeg -f concat -safe 0 -i concat_list.txt \
            -c:v libsvtav1 -crf 35 -preset 6 \
            -vf "scale='min(1920,iw)':'min(1080,ih)':force_original_aspect_ratio=decrease" \
            -r 30 \
            -c:a libopus -b:a 96k \
            -y "output.webm"

          OUTPUT_SIZE=$(stat -c%s "output.webm")
          echo "Output size: $(numfmt --to=iec $OUTPUT_SIZE)"

          # Upload result
          wrangler r2 object put "ultrabroken-media/$OUTPUT_KEY" \
            --file="output.webm" --content-type="video/webm" --remote
          echo "Uploaded: $OUTPUT_KEY"

          # Cleanup
          rm -f trimmed_*.mkv concat_list.txt output.webm
          echo ""
          echo "=== Edit complete ==="
