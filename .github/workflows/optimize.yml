name: Media — Optimize Images to AVIF

on:
  workflow_dispatch:
    inputs:
      keys:
        description: 'Comma-separated R2 keys to optimize (e.g., screens/shot.jpg,screens/demo.png)'
        required: true
        type: string

concurrency:
  group: optimize
  cancel-in-progress: false

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Cache npm packages
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-optimize

      - name: Install wrangler and sharp
        run: |
          npm install -g wrangler@4
          npm install --prefix /tmp sharp

      - name: Optimize and re-upload
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail

          IFS=',' read -ra KEYS <<< "${{ inputs.keys }}"

          for key in "${KEYS[@]}"; do
            key=$(echo "$key" | xargs)  # trim whitespace
            ext="${key##*.}"
            ext_lower=$(echo "$ext" | tr '[:upper:]' '[:lower:]')
            stem="${key%.*}"
            out_key="${stem}.avif"

            # Skip if already AVIF
            if [ "$ext_lower" = "avif" ]; then
              echo "Skipping $key — already AVIF"
              continue
            fi

            echo "=== Optimizing: $key ==="

            # Download from R2
            wrangler r2 object get "ultrabroken-media/$key" --file="input.$ext_lower" --remote

            original_size=$(stat -c%s "input.$ext_lower")
            echo "Original: $(numfmt --to=iec $original_size)"

            # Convert to AVIF using sharp
            NODE_PATH=/tmp/node_modules node -e "
              const sharp = require('sharp');
              sharp(process.argv[1]).avif({ quality: 65 }).toFile(process.argv[2]).then(
                info => console.log('Converted:', info.width + 'x' + info.height, info.size + ' bytes'),
                err => { console.error(err); process.exit(1); }
              );
            " "input.$ext_lower" "output.avif"

            new_size=$(stat -c%s "output.avif")
            savings=$(( (original_size - new_size) * 100 / original_size ))
            echo "Optimized: $(numfmt --to=iec $new_size) (-${savings}%)"

            # If AVIF is larger, keep the original instead
            if [ $new_size -gt $original_size ]; then
              echo "AVIF is larger ($new_size > $original_size), keeping original"
              rm "output.avif"
              # Don't upload; original remains on R2
            else
              # Upload AVIF version
              wrangler r2 object put "ultrabroken-media/$out_key" \
                --file="output.avif" --content-type="image/avif" --remote
              echo "Uploaded: $out_key"

              # Delete the original if the key changed
              if [ "$key" != "$out_key" ]; then
                wrangler r2 object delete "ultrabroken-media/$key" --remote
                echo "Deleted original: $key"
              fi
            fi

            # Cleanup temp files
            rm -f "input.$ext_lower" "output.avif"
            echo "=== Done: $key → $out_key ==="
            echo ""
          done

          echo "All optimization complete"
