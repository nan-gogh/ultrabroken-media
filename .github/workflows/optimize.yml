name: Media — Optimize Images to AVIF

on:
  workflow_dispatch:
    inputs:
      keys:
        description: 'Comma-separated R2 keys to optimize (e.g., screens/shot.jpg,screens/demo.png)'
        required: true
        type: string

concurrency:
  group: optimize
  cancel-in-progress: false

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache npm packages
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-optimize

      - name: Install wrangler
        run: npm install -g wrangler@4

      - name: Create sharp conversion script
        run: |
          cat > convert.js << 'EOF'
          const sharp = require('sharp');
          const fs = require('fs');
          const path = require('path');

          async function convert(inputFile, outputFile) {
            try {
              await sharp(inputFile)
                .avif({ quality: 65 })
                .toFile(outputFile);
              console.log(`Converted: ${inputFile} -> ${outputFile}`);
            } catch (err) {
              console.error('Conversion failed:', err);
              process.exit(1);
            }
          }

          const args = process.argv.slice(2);
          if (args.length !== 2) {
            console.error('Usage: node convert.js <input> <output>');
            process.exit(1);
          }

          convert(args[0], args[1]);
          EOF
        working-directory: /tmp

      - name: Install sharp
        run: npm install --prefix /tmp sharp

      - name: Optimize and re-upload
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail

          IFS=',' read -ra KEYS <<< "${{ inputs.keys }}"

          for key in "${KEYS[@]}"; do
            key=$(echo "$key" | xargs)  # trim whitespace
            ext="${key##*.}"
            ext_lower=$(echo "$ext" | tr '[:upper:]' '[:lower:]')
            stem="${key%.*}"
            out_key="${stem}.avif"

            # Skip if already AVIF
            if [ "$ext_lower" = "avif" ]; then
              echo "Skipping $key — already AVIF"
              continue
            fi

            echo "=== Optimizing: $key ==="

            # Download from R2
            wrangler r2 object get "ultrabroken-media/$key" --file="input.$ext_lower" --remote

            original_size=$(stat -c%s "input.$ext_lower")
            echo "Original: $(numfmt --to=iec $original_size)"

            # Convert to AVIF using sharp (Node.js)
            node /tmp/convert.js "input.$ext_lower" "output.avif"

            new_size=$(stat -c%s "output.avif")
            savings=$(( (original_size - new_size) * 100 / original_size ))
            echo "Optimized: $(numfmt --to=iec $new_size) (-${savings}%)"

            # If AVIF is larger, keep the original instead
            if [ $new_size -gt $original_size ]; then
              echo "AVIF is larger ($new_size > $original_size), keeping original"
              rm "output.avif"
              # Don't upload; original remains on R2
            else
              # Upload AVIF version
              wrangler r2 object put "ultrabroken-media/$out_key" \
                --file="output.avif" --content-type="image/avif" --remote
              echo "Uploaded: $out_key"

              # Delete the original if the key changed
              if [ "$key" != "$out_key" ]; then
                wrangler r2 object delete "ultrabroken-media/$key" --remote
                echo "Deleted original: $key"
              fi
            fi

            # Cleanup temp files
            rm -f "input.$ext_lower" "output.avif"
            echo "=== Done: $key → $out_key ==="
            echo ""
          done

          echo "All optimization complete"
