name: Media — Publish Editor to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'public/**'
  workflow_dispatch: {}

# Required for the OIDC token that actions/deploy-pages uses.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; do not cancel in-progress runs so a
# partial deploy is never left in a broken state.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Deploy the entire public/ folder as the site root.
          path: public

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
