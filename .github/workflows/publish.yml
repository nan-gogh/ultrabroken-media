name: Media — Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - '.github/**'
      - 'README.md'
  workflow_dispatch: {}

concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fail early if Cloudflare secrets missing
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ] || [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "Missing Cloudflare secrets (CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID)."
            exit 1
          fi

      - name: Prepare publish directory
        run: |
          mkdir -p _site
          [ -d screens ] && rsync -a screens/ _site/screens/ || true
          [ -d video ]   && rsync -a video/ _site/video/     || true
          [ -d social ]  && rsync -a social/ _site/social/   || true
          find _site -name '.gitkeep' -delete

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy _site --project-name=ultrabroken-media --branch=main

      - name: Orphan-reset to keep repo size minimal
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Exclude runner-generated artifacts from the commit
          printf 'node_modules/\n_site/\n' >> .gitignore

          git checkout --orphan _fresh
          git add -A
          git commit -m "chore: reset history — assets live on Cloudflare Pages"
          git branch -M _fresh main
          git push --force origin main
