name: Media — Transcode Video to H.264+AAC

on:
  workflow_dispatch:
    inputs:
      keys:
        description: 'Comma-separated R2 keys to transcode (e.g., video/clip.mp4,video/demo.mov)'
        required: true
        type: string

concurrency:
  group: transcode
  cancel-in-progress: false

jobs:
  transcode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Cache ffmpeg
        id: cache-ffmpeg
        uses: actions/cache@v5
        with:
          path: /usr/local/bin/ffmpeg
          key: ffmpeg-linux64-gpl-v1

      - name: Install ffmpeg
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          wget -q -O /tmp/ff.tar.xz \
            'https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz'
          tar -xJf /tmp/ff.tar.xz -C /tmp ffmpeg-master-latest-linux64-gpl/bin/ffmpeg
          sudo mv /tmp/ffmpeg-master-latest-linux64-gpl/bin/ffmpeg /usr/local/bin/ffmpeg
          rm -rf /tmp/ff.tar.xz /tmp/ffmpeg-master-latest-linux64-gpl

      - name: Cache npm packages
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-wrangler-4

      - name: Install wrangler
        run: npm install -g wrangler@4

      - name: Transcode and re-upload
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail

          IFS=',' read -ra KEYS <<< "${{ inputs.keys }}"

          for key in "${KEYS[@]}"; do
            key=$(echo "$key" | xargs)  # trim whitespace
            ext="${key##*.}"
            ext_lower=$(echo "$ext" | tr '[:upper:]' '[:lower:]')
            stem="${key%.*}"
            out_key="${stem}.mp4"

            echo "=== Transcoding: $key ==="

            # Download from R2
            wrangler r2 object get "ultrabroken-media/$key" --file="input.$ext_lower" --remote

            original_size=$(stat -c%s "input.$ext_lower")
            echo "Original: $(numfmt --to=iec $original_size)"

            # Probe duration and compute original bitrate for maxrate cap
            dur=$(ffmpeg -i "input.$ext_lower" 2>&1 | grep -oP 'Duration: \K[0-9:.]+' | head -1)
            if [ -n "$dur" ]; then
              IFS=':' read -r hh mm ss <<< "$dur"
              total_secs=$(echo "$hh * 3600 + $mm * 60 + $ss" | bc)
              orig_kbps=$(echo "$original_size * 8 / $total_secs / 1000" | bc)
              echo "Original bitrate: ${orig_kbps} kbps"
              maxrate_args="-maxrate ${orig_kbps}k -bufsize $((orig_kbps * 2))k"
            else
              maxrate_args=""
            fi

            # Transcode: H.264+AAC, max 720p24, CRF 30, capped at original bitrate
            ffmpeg -i "input.$ext_lower" \
              -c:v libx264 -crf 30 -preset slow $maxrate_args \
              -vf "scale='min(1280,iw)':'min(720,ih)':force_original_aspect_ratio=decrease" \
              -r 24 \
              -c:a aac -b:a 64k \
              -movflags +faststart \
              -y "output.mp4"

            new_size=$(stat -c%s "output.mp4")

            if [ "$new_size" -ge "$original_size" ]; then
              echo "Skipped: transcoded file is not smaller ($(numfmt --to=iec $new_size) >= $(numfmt --to=iec $original_size)), keeping original"
            else
              savings=$(( (original_size - new_size) * 100 / original_size ))
              echo "Transcoded: $(numfmt --to=iec $new_size) (-${savings}%)"

              # Upload transcoded file
              wrangler r2 object put "ultrabroken-media/$out_key" \
                --file="output.mp4" --content-type="video/mp4" --remote
              echo "Uploaded: $out_key"

              # Delete the original if the key changed
              if [ "$key" != "$out_key" ]; then
                wrangler r2 object delete "ultrabroken-media/$key" --remote
                echo "Deleted original: $key"
              fi
            fi

            # Cleanup temp files
            rm -f "input.$ext_lower" "output.mp4"
            echo "=== Done: $key → $out_key ==="
            echo ""
          done

          echo "All transcoding complete"
